<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>美味点餐 · 登录</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #0a0a0f;
            position: relative;
            overflow: hidden;
            padding: 1rem;
        }

        .bg-gradient {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        .bg-gradient::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: 
                radial-gradient(circle at 20% 30%, rgba(139, 92, 246, 0.15) 0%, transparent 50%),
                radial-gradient(circle at 80% 70%, rgba(236, 72, 153, 0.12) 0%, transparent 50%),
                radial-gradient(circle at 50% 50%, rgba(59, 130, 246, 0.08) 0%, transparent 60%);
            animation: bgPulse 8s ease-in-out infinite;
        }

        @keyframes bgPulse {
            0%, 100% { opacity: 0.6; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.05); }
        }

        .login-wrapper {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 440px;
        }

        .login-card-container {
            position: relative;
            padding: 2px;
            border-radius: 28px;
            background: #1a1a2e;
            overflow: hidden;
        }

        .login-card-container::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: conic-gradient(
                from 0deg,
                transparent 0deg,
                #8b5cf6 60deg,
                #ec4899 120deg,
                #3b82f6 180deg,
                #06b6d4 240deg,
                #10b981 300deg,
                transparent 360deg
            );
            animation: beamRotate 4s linear infinite;
            opacity: 0.8;
        }

        .login-card-container::after {
            content: '';
            position: absolute;
            top: 2px;
            left: 2px;
            right: 2px;
            bottom: 2px;
            background: #0f0f1a;
            border-radius: 26px;
            z-index: 1;
        }

        @keyframes beamRotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .login-card {
            position: relative;
            z-index: 2;
            padding: 3rem 2.5rem;
            border-radius: 26px;
            background: #0f0f1a;
        }

        .login-header {
            text-align: center;
            margin-bottom: 2.5rem;
        }

        .logo-icon {
            width: 64px;
            height: 64px;
            margin: 0 auto 1rem;
            background: linear-gradient(135deg, #8b5cf6 0%, #ec4899 100%);
            border-radius: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8rem;
            color: white;
            box-shadow: 0 8px 24px rgba(139, 92, 246, 0.4);
            animation: logoPulse 2s ease-in-out infinite;
        }

        @keyframes logoPulse {
            0%, 100% { box-shadow: 0 8px 24px rgba(139, 92, 246, 0.4); }
            50% { box-shadow: 0 8px 32px rgba(236, 72, 153, 0.5); }
        }

        .login-header h1 {
            font-size: 1.8rem;
            font-weight: 700;
            color: #ffffff;
            margin-bottom: 0.5rem;
            letter-spacing: -0.02em;
        }

        .login-header p {
            color: #6b7280;
            font-size: 0.95rem;
        }

        .form-group {
            margin-bottom: 1.5rem;
            position: relative;
        }

        .form-group label {
            display: block;
            font-size: 0.85rem;
            font-weight: 500;
            color: #9ca3af;
            margin-bottom: 0.5rem;
        }

        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
            background: #1a1a2e;
            border: 1.5px solid #2d2d4a;
            border-radius: 12px;
            transition: all 0.3s ease;
        }

        .input-wrapper:focus-within {
            border-color: #8b5cf6;
            box-shadow: 0 0 0 4px rgba(139, 92, 246, 0.15);
        }

        .input-icon {
            position: absolute;
            left: 14px;
            color: #6b7280;
            font-size: 1rem;
            transition: color 0.3s ease;
            pointer-events: none;
            z-index: 1;
        }

        .input-wrapper:focus-within .input-icon {
            color: #8b5cf6;
        }

        .input-wrapper input {
            width: 100%;
            padding: 0.85rem 3rem 0.85rem 2.8rem;
            border: none;
            background: transparent;
            font-size: 0.95rem;
            outline: none;
            color: #f3f4f6;
            position: relative;
            z-index: 2;
        }

        .input-wrapper input::placeholder {
            color: #4b5563;
        }

        .input-wrapper input[type="password"]::-ms-reveal,
        .input-wrapper input[type="password"]::-ms-clear {
            display: none;
        }

        .toggle-password {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: #6b7280;
            cursor: pointer;
            font-size: 1rem;
            transition: color 0.3s ease;
            padding: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 3;
        }

        .toggle-password:hover {
            color: #8b5cf6;
        }

        .form-options {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.8rem;
        }

        .form-options label {
            display: flex;
            align-items: center;
            font-size: 0.88rem;
            color: #9ca3af;
            cursor: pointer;
            gap: 0.5rem;
        }

        .form-options label input[type="checkbox"] {
            width: 16px;
            height: 16px;
            accent-color: #8b5cf6;
            cursor: pointer;
        }

        .form-options a {
            color: #8b5cf6;
            text-decoration: none;
            font-size: 0.88rem;
            font-weight: 500;
            transition: color 0.3s ease;
        }

        .form-options a:hover {
            color: #a78bfa;
        }

        .login-btn {
            position: relative;
            width: 100%;
            padding: 0.95rem;
            background: linear-gradient(135deg, #8b5cf6 0%, #ec4899 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 0.5rem;
            overflow: hidden;
        }

        .login-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
            transition: left 0.5s ease;
        }

        .login-btn:hover::before {
            left: 100%;
        }

        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 28px rgba(139, 92, 246, 0.4);
        }

        .login-btn:active {
            transform: translateY(0);
        }

        .login-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none !important;
        }

        .login-btn:disabled::before {
            display: none;
        }

        .login-btn .spinner {
            display: none;
            width: 20px;
            height: 20px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .login-btn.loading .spinner {
            display: inline-block;
        }

        .login-btn.loading .btn-text {
            display: none;
        }

        .error-message {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.3);
            border-radius: 10px;
            padding: 0.75rem 1rem;
            color: #fca5a5;
            font-size: 0.88rem;
            margin-bottom: 1.2rem;
            display: none;
            align-items: center;
            gap: 0.6rem;
        }

        .error-message.show {
            display: flex;
            animation: shake 0.4s ease;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-6px); }
            75% { transform: translateX(6px); }
        }

        .toast-message {
            position: fixed;
            top: 24px;
            right: 24px;
            background: #1f2937;
            color: white;
            padding: 0.8rem 1.5rem;
            border-radius: 12px;
            font-size: 0.9rem;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.4);
            opacity: 0;
            transform: translateY(-20px);
            transition: all 0.3s ease;
            pointer-events: none;
            z-index: 999;
            max-width: 350px;
            border: 1px solid #374151;
        }

        .toast-message.show {
            opacity: 1;
            transform: translateY(0);
        }

        .toast-message.error {
            background: rgba(239, 68, 68, 0.9);
            border-color: #ef4444;
        }

        .toast-message.success {
            background: rgba(16, 185, 129, 0.9);
            border-color: #10b981;
        }

        .register-link {
            text-align: center;
            margin-top: 1.5rem;
            padding-top: 1.5rem;
            border-top: 1px solid #2d2d4a;
            color: #6b7280;
            font-size: 0.9rem;
        }

        .register-link a {
            color: #8b5cf6;
            text-decoration: none;
            font-weight: 500;
            margin-left: 4px;
            transition: color 0.3s ease;
        }

        .register-link a:hover {
            color: #a78bfa;
        }

        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(4px);
            justify-content: center;
            align-items: center;
            z-index: 1000;
            padding: 1rem;
        }

        .modal-overlay.active {
            display: flex;
        }

        .modal {
            background: #0f0f1a;
            border-radius: 20px;
            padding: 2rem;
            width: 100%;
            max-width: 420px;
            border: 1px solid #2d2d4a;
            animation: slideUp 0.3s ease;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
        }

        .modal-header h2 {
            color: #ffffff;
            font-size: 1.3rem;
            font-weight: 600;
        }

        .modal-header h2 i {
            color: #8b5cf6;
            margin-right: 0.5rem;
        }

        .modal-close {
            background: none;
            border: none;
            color: #6b7280;
            font-size: 1.5rem;
            cursor: pointer;
            transition: color 0.3s ease;
            padding: 4px;
            border-radius: 8px;
        }

        .modal-close:hover {
            color: #fca5a5;
            background: rgba(239, 68, 68, 0.1);
        }

        .modal-body {
            margin-bottom: 1.5rem;
        }

        .modal-footer {
            display: flex;
            justify-content: flex-end;
            gap: 0.8rem;
            padding-top: 1rem;
            border-top: 1px solid #2d2d4a;
        }

        .modal-btn {
            padding: 0.65rem 1.5rem;
            border-radius: 10px;
            font-size: 0.9rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
            border: none;
        }

        .modal-btn.cancel {
            background: #1a1a2e;
            color: #9ca3af;
            border: 1px solid #2d2d4a;
        }

        .modal-btn.cancel:hover {
            background: #2d2d4a;
        }

        .modal-btn.confirm {
            background: linear-gradient(135deg, #8b5cf6 0%, #ec4899 100%);
            color: white;
        }

        .modal-btn.confirm:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(139, 92, 246, 0.4);
        }

        .modal-btn.confirm:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none !important;
        }

        @media (max-width: 480px) {
            .login-card {
                padding: 2rem 1.5rem;
            }
            .login-header h1 {
                font-size: 1.5rem;
            }
            .form-options {
                flex-direction: column;
                gap: 0.8rem;
                align-items: flex-start;
            }
            .modal {
                padding: 1.5rem;
            }
        }
    </style>
</head>
<body>
    <div class="bg-gradient"></div>

    <div id="toast" class="toast-message"></div>

    <div class="login-wrapper">
        <div class="login-card-container">
            <div class="login-card">
                <div class="login-header">
                    <div class="logo-icon">
                        <i class="fas fa-utensils"></i>
                    </div>
                    <h1>美味点餐系统</h1>
                    <p>欢迎回来，请登录您的账号</p>
                </div>

                <div id="errorMessage" class="error-message">
                    <i class="fas fa-exclamation-circle"></i>
                    <span id="errorText">用户名或密码错误</span>
                </div>

                <form id="loginForm" onsubmit="return false;">
                    <div class="form-group">
                        <label for="username">用户名</label>
                        <div class="input-wrapper">
                            <i class="fas fa-user input-icon"></i>
                            <input
                                type="text"
                                id="username"
                                placeholder="请输入用户名"
                                required
                                autocomplete="username"
                            >
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="password">密码</label>
                        <div class="input-wrapper">
                            <i class="fas fa-lock input-icon"></i>
                            <input
                                type="password"
                                id="password"
                                placeholder="请输入密码"
                                required
                                autocomplete="current-password"
                            >
                            <button type="button" class="toggle-password" id="togglePassword" title="显示/隐藏密码">
                                <i class="fas fa-eye"></i>
                            </button>
                        </div>
                    </div>

                    <div class="form-options">
                        <label>
                            <input type="checkbox" id="rememberMe" checked>
                            记住我
                        </label>
                        <a href="#" id="forgotPasswordLink">忘记密码？</a>
                    </div>

                    <button type="submit" class="login-btn" id="loginBtn">
                        <span class="spinner"></span>
                        <span class="btn-text"><i class="fas fa-sign-in-alt"></i> 登 录</span>
                    </button>

                    <div class="register-link">
                        <span>还没有账号？</span>
                        <a href="#" id="registerLink">立即注册</a>
                    </div>
                </form>

            </div>
        </div>
    </div>

    <!-- 注册弹窗 -->
    <div class="modal-overlay" id="registerModal">
        <div class="modal" id="registerModalContent">
            <div class="modal-header">
                <h2><i class="fas fa-user-plus"></i> 用户注册</h2>
                <button class="modal-close" id="closeRegisterBtn">&times;</button>
            </div>
            <div class="modal-body">
                <div id="registerError" class="error-message" style="margin-bottom: 1rem;">
                    <i class="fas fa-exclamation-circle"></i>
                    <span id="registerErrorText">错误信息</span>
                </div>
                <div class="form-group">
                    <label for="regUsername">用户名</label>
                    <div class="input-wrapper">
                        <i class="fas fa-user input-icon"></i>
                        <input
                            type="text"
                            id="regUsername"
                            placeholder="请输入用户名（3-10个字符）"
                            maxlength="10"
                        >
                    </div>
                </div>
                <div class="form-group">
                    <label for="regPhone">手机号</label>
                    <div class="input-wrapper">
                        <i class="fas fa-phone input-icon"></i>
                        <input
                            type="tel"
                            id="regPhone"
                            placeholder="请输入11位手机号"
                            maxlength="11"
                        >
                    </div>
                </div>
                <div class="form-group">
                    <label for="regPassword">密码</label>
                    <div class="input-wrapper">
                        <i class="fas fa-lock input-icon"></i>
                        <input
                            type="password"
                            id="regPassword"
                            placeholder="请输入密码"
                            maxlength="11"
                        >
                        <button type="button" class="toggle-password" id="toggleRegPassword" title="显示/隐藏密码">
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>
                </div>
            </div>
            <div class="modal-footer">
                <button class="modal-btn cancel" onclick="closeRegisterModal()">取消</button>
                <button class="modal-btn confirm" id="registerBtn">
                    <span class="spinner"></span>
                    <span class="btn-text">注 册</span>
                </button>
            </div>
        </div>
    </div>

    <!-- 忘记密码弹窗 -->
    <div class="modal-overlay" id="forgotModal">
        <div class="modal" id="forgotModalContent">
            <div class="modal-header">
                <h2><i class="fas fa-key"></i> 忘记密码</h2>
                <button class="modal-close" id="closeForgotBtn">&times;</button>
            </div>
            <div class="modal-body" id="forgotModalBody">
                <div id="forgotError" class="error-message" style="margin-bottom: 1rem;">
                    <i class="fas fa-exclamation-circle"></i>
                    <span id="forgotErrorText">错误信息</span>
                </div>
                <div class="form-group">
                    <label for="forgotPhone">手机号</label>
                    <div class="input-wrapper">
                        <i class="fas fa-phone input-icon"></i>
                        <input
                            type="tel"
                            id="forgotPhone"
                            placeholder="请输入注册时的手机号"
                            maxlength="11"
                        >
                    </div>
                </div>
                <div id="newPasswordSection" style="display: none;">
                    <div class="form-group">
                        <label for="newPassword">新密码</label>
                        <div class="input-wrapper">
                            <i class="fas fa-lock input-icon"></i>
                            <input
                                type="password"
                                id="newPassword"
                                placeholder="请输入新密码"
                                maxlength="11"
                            >
                            <button type="button" class="toggle-password" id="toggleNewPassword" title="显示/隐藏密码">
                                <i class="fas fa-eye"></i>
                            </button>
                        </div>
                    </div>
                </div>
            </div>
            <div class="modal-footer">
                <button class="modal-btn cancel" onclick="closeForgotPasswordModal()">取消</button>
                <button class="modal-btn confirm" id="forgotBtn">
                    <span class="spinner"></span>
                    <span class="btn-text">验 证</span>
                </button>
            </div>
        </div>
    </div>

    <script>
        (function() {
            "use strict";

            const API_BASE = 'http://localhost:8080';
            const SESSION_TIMEOUT = 30 * 60 * 1000;

            const loginForm = document.getElementById('loginForm');
            const usernameInput = document.getElementById('username');
            const passwordInput = document.getElementById('password');
            const loginBtn = document.getElementById('loginBtn');
            const errorMessage = document.getElementById('errorMessage');
            const errorText = document.getElementById('errorText');
            const togglePasswordBtn = document.getElementById('togglePassword');
            const rememberMe = document.getElementById('rememberMe');
            const toast = document.getElementById('toast');

            let toastTimer = null;

            function showToast(message, type = 'success', duration = 3000) {
                toast.textContent = message;
                toast.className = 'toast-message ' + type;
                toast.classList.add('show');

                clearTimeout(toastTimer);
                toastTimer = setTimeout(() => {
                    toast.classList.remove('show');
                }, duration);
            }

            function showError(message) {
                errorText.textContent = message;
                errorMessage.classList.add('show');
                setTimeout(() => {
                    errorMessage.classList.remove('show');
                }, 4000);
            }

            function hideError() {
                errorMessage.classList.remove('show');
            }

            togglePasswordBtn.addEventListener('click', function() {
                const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
                passwordInput.setAttribute('type', type);
                this.querySelector('i').className = type === 'password' ? 'fas fa-eye' : 'fas fa-eye-slash';
            });

            function isTokenValid(token) {
                if (!token) return false;
                try {
                    const base64Url = token.split('.')[1];
                    const base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
                    const jsonPayload = decodeURIComponent(atob(base64).split('').map(function(c) {
                        return '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2);
                    }).join(''));
                    const payload = JSON.parse(jsonPayload);
                    const now = Math.floor(Date.now() / 1000);
                    return payload.exp > now;
                } catch (e) {
                    return false;
                }
            }

            function checkLoginStatus() {
                const token = sessionStorage.getItem('auth_token') || localStorage.getItem('auth_token');
                if (token && isTokenValid(token)) {
                    window.location.href = '/user/goods.html';
                } else {
                    sessionStorage.removeItem('auth_token');
                    localStorage.removeItem('auth_token');
                    localStorage.removeItem('username');
                }
            }

            async function handleLogin(event) {
                event.preventDefault();
                hideError();

                const username = usernameInput.value.trim();
                const password = passwordInput.value.trim();

                if (!username || !password) {
                    showError('请输入用户名和密码');
                    return;
                }

                loginBtn.classList.add('loading');
                loginBtn.disabled = true;

                try {
                    const response = await fetch(`${API_BASE}/auth/login`, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                        },
                        body: JSON.stringify({ username, password })
                    });

                    const data = await response.json();

                    if (response.ok && data.success) {
                        const token = data.access_token;
                        
                        if (rememberMe.checked) {
                            localStorage.setItem('auth_token', token);
                            localStorage.setItem('username', username);
                        } else {
                            sessionStorage.setItem('auth_token', token);
                            sessionStorage.setItem('username', username);
                        }

                        showToast('登录成功！正在跳转...', 'success', 1500);

                        setTimeout(() => {
                            window.location.href = '/user/goods.html';
                        }, 1500);
                    } else {
                        showError(data.detail || '用户名或密码错误');
                        loginBtn.classList.remove('loading');
                        loginBtn.disabled = false;
                        showToast('登录失败', 'error');
                        passwordInput.value = '';
                        passwordInput.focus();
                    }
                } catch (error) {
                    console.error('登录异常:', error);
                    showError('服务器连接失败，请稍后重试');
                    loginBtn.classList.remove('loading');
                    loginBtn.disabled = false;
                }
            }

            document.addEventListener('keydown', function(event) {
                if (event.key === 'Enter') {
                    const activeElement = document.activeElement;
                    if (activeElement === usernameInput || activeElement === passwordInput) {
                        handleLogin(event);
                    }
                }
            });

            usernameInput.addEventListener('input', hideError);
            passwordInput.addEventListener('input', hideError);

            loginForm.addEventListener('submit', handleLogin);

            const savedUsername = localStorage.getItem('saved_username');
            if (savedUsername) {
                usernameInput.value = savedUsername;
                rememberMe.checked = true;
            }

            rememberMe.addEventListener('change', function() {
                if (!this.checked) {
                    localStorage.removeItem('saved_username');
                } else {
                    localStorage.setItem('saved_username', usernameInput.value);
                }
            });

            usernameInput.addEventListener('change', function() {
                if (rememberMe.checked && this.value.trim()) {
                    localStorage.setItem('saved_username', this.value.trim());
                }
            });

            checkLoginStatus();
            usernameInput.focus();

            console.log('🍜 点餐系统登录页面已加载');
            console.log('⏱️  会话超时时间：30分钟');

            // ===== 注册功能 =====
            const registerModal = document.getElementById('registerModal');
            const registerBtn = document.getElementById('registerBtn');
            const closeRegisterBtn = document.getElementById('closeRegisterBtn');
            const registerLink = document.getElementById('registerLink');
            const regUsernameInput = document.getElementById('regUsername');
            const regPhoneInput = document.getElementById('regPhone');
            const regPasswordInput = document.getElementById('regPassword');
            const registerError = document.getElementById('registerError');
            const registerErrorText = document.getElementById('registerErrorText');
            const toggleRegPasswordBtn = document.getElementById('toggleRegPassword');

            function showRegisterModal() {
                registerModal.classList.add('active');
                registerError.classList.remove('show');
                regUsernameInput.value = '';
                regPhoneInput.value = '';
                regPasswordInput.value = '';
                regUsernameInput.focus();
            }

            function closeRegisterModal() {
                registerModal.classList.remove('active');
            }

            registerLink.addEventListener('click', function(e) {
                e.preventDefault();
                showRegisterModal();
            });

            closeRegisterBtn.addEventListener('click', closeRegisterModal);

            function showRegisterError(message) {
                registerErrorText.textContent = message;
                registerError.classList.add('show');
                setTimeout(() => {
                    registerError.classList.remove('show');
                }, 4000);
            }

            toggleRegPasswordBtn.addEventListener('click', function() {
                const type = regPasswordInput.getAttribute('type') === 'password' ? 'text' : 'password';
                regPasswordInput.setAttribute('type', type);
                this.querySelector('i').className = type === 'password' ? 'fas fa-eye' : 'fas fa-eye-slash';
            });

            async function handleRegister() {
                const username = regUsernameInput.value.trim();
                const phone = regPhoneInput.value.trim();
                const password = regPasswordInput.value.trim();

                if (!username) {
                    showRegisterError('请输入用户名');
                    regUsernameInput.focus();
                    return;
                }
                if (username.length < 3 || username.length > 10) {
                    showRegisterError('用户名长度必须在3-10个字符之间');
                    regUsernameInput.focus();
                    return;
                }
                if (!phone) {
                    showRegisterError('请输入手机号');
                    regPhoneInput.focus();
                    return;
                }
                if (!/^1[3-9]\d{9}$/.test(phone)) {
                    showRegisterError('请输入有效的11位手机号');
                    regPhoneInput.focus();
                    return;
                }
                if (!password) {
                    showRegisterError('请输入密码');
                    regPasswordInput.focus();
                    return;
                }

                registerBtn.classList.add('loading');
                registerBtn.disabled = true;

                try {
                    const response = await fetch(`${API_BASE}/auth/register`, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                        },
                        body: JSON.stringify({ username, phone, password })
                    });

                    const data = await response.json();

                    if (response.ok && data.success) {
                        showToast('注册成功！请登录', 'success', 2000);
                        closeRegisterModal();
                        usernameInput.value = username;
                        passwordInput.value = '';
                        passwordInput.focus();
                    } else {
                        showRegisterError(data.detail || '注册失败');
                    }
                } catch (error) {
                    console.error('注册异常:', error);
                    showRegisterError('服务器连接失败，请稍后重试');
                } finally {
                    registerBtn.classList.remove('loading');
                    registerBtn.disabled = false;
                }
            }

            registerBtn.addEventListener('click', handleRegister);

            // ===== 忘记密码功能 =====
            const forgotModal = document.getElementById('forgotModal');
            const forgotBtn = document.getElementById('forgotBtn');
            const closeForgotBtn = document.getElementById('closeForgotBtn');
            const forgotPasswordLink = document.getElementById('forgotPasswordLink');
            const forgotPhoneInput = document.getElementById('forgotPhone');
            const newPasswordInput = document.getElementById('newPassword');
            const forgotError = document.getElementById('forgotError');
            const forgotErrorText = document.getElementById('forgotErrorText');
            const newPasswordSection = document.getElementById('newPasswordSection');
            const toggleNewPasswordBtn = document.getElementById('toggleNewPassword');
            let forgotStep = 1;

            function showForgotPasswordModal() {
                forgotModal.classList.add('active');
                forgotError.classList.remove('show');
                forgotPhoneInput.value = '';
                newPasswordInput.value = '';
                newPasswordSection.style.display = 'none';
                forgotBtn.querySelector('.btn-text').textContent = '验 证';
                forgotBtn.classList.remove('loading');
                forgotBtn.disabled = false;
                forgotStep = 1;
                forgotPhoneInput.focus();
            }

            function closeForgotPasswordModal() {
                forgotModal.classList.remove('active');
                forgotStep = 1;
            }

            forgotPasswordLink.addEventListener('click', function(e) {
                e.preventDefault();
                showForgotPasswordModal();
            });

            closeForgotBtn.addEventListener('click', closeForgotPasswordModal);

            function showForgotError(message) {
                forgotErrorText.textContent = message;
                forgotError.classList.add('show');
                setTimeout(() => {
                    forgotError.classList.remove('show');
                }, 4000);
            }

            toggleNewPasswordBtn.addEventListener('click', function() {
                const type = newPasswordInput.getAttribute('type') === 'password' ? 'text' : 'password';
                newPasswordInput.setAttribute('type', type);
                this.querySelector('i').className = type === 'password' ? 'fas fa-eye' : 'fas fa-eye-slash';
            });

            async function handleForgotPassword() {
                if (forgotStep === 1) {
                    const phone = forgotPhoneInput.value.trim();
                    if (!phone) {
                        showForgotError('请输入手机号');
                        forgotPhoneInput.focus();
                        return;
                    }
                    if (!/^1[3-9]\d{9}$/.test(phone)) {
                        showForgotError('请输入有效的11位手机号');
                        forgotPhoneInput.focus();
                        return;
                    }

                    forgotBtn.classList.add('loading');
                    forgotBtn.disabled = true;

                    try {
                        const response = await fetch(`${API_BASE}/auth/reset_password`, {
                            method: 'POST',
                            headers: {
                                'Content-Type': 'application/json',
                            },
                            body: JSON.stringify({ phone, new_password: '' })
                        });

                        const data = await response.json();

                        if (response.status === 404) {
                            showForgotError('该手机号未注册');
                            forgotBtn.classList.remove('loading');
                            forgotBtn.disabled = false;
                        } else if (response.ok) {
                            forgotStep = 2;
                            newPasswordSection.style.display = 'block';
                            forgotBtn.querySelector('.btn-text').textContent = '确 定';
                            forgotBtn.classList.remove('loading');
                            forgotBtn.disabled = false;
                            newPasswordInput.focus();
                            showToast('验证成功，请设置新密码', 'success');
                        } else {
                            showForgotError(data.detail || '验证失败');
                            forgotBtn.classList.remove('loading');
                            forgotBtn.disabled = false;
                        }
                    } catch (error) {
                        console.error('验证异常:', error);
                        showForgotError('服务器连接失败，请稍后重试');
                        forgotBtn.classList.remove('loading');
                        forgotBtn.disabled = false;
                    }
                } else if (forgotStep === 2) {
                    const phone = forgotPhoneInput.value.trim();
                    const newPassword = newPasswordInput.value.trim();

                    if (!newPassword) {
                        showForgotError('请输入新密码');
                        newPasswordInput.focus();
                        return;
                    }

                    forgotBtn.classList.add('loading');
                    forgotBtn.disabled = true;

                    try {
                        const response = await fetch(`${API_BASE}/auth/reset_password`, {
                            method: 'POST',
                            headers: {
                                'Content-Type': 'application/json',
                            },
                            body: JSON.stringify({ phone, new_password: newPassword })
                        });

                        const data = await response.json();

                        if (response.ok && data.success) {
                            showToast('密码修改成功，请登录', 'success', 2000);
                            closeForgotPasswordModal();
                            usernameInput.value = data.user.username;
                            passwordInput.value = '';
                            passwordInput.focus();
                        } else {
                            showForgotError(data.detail || '密码修改失败');
                        }
                    } catch (error) {
                        console.error('密码修改异常:', error);
                        showForgotError('服务器连接失败，请稍后重试');
                    } finally {
                        forgotBtn.classList.remove('loading');
                        forgotBtn.disabled = false;
                    }
                }
            }

            forgotBtn.addEventListener('click', handleForgotPassword);

            document.addEventListener('keydown', function(event) {
                if (event.key === 'Enter') {
                    const activeElement = document.activeElement;
                    if (registerModal.classList.contains('active')) {
                        if (activeElement === regUsernameInput || activeElement === regPhoneInput || activeElement === regPasswordInput) {
                            handleRegister();
                        }
                    } else if (forgotModal.classList.contains('active')) {
                        if (activeElement === forgotPhoneInput || activeElement === newPasswordInput) {
                            handleForgotPassword();
                        }
                    }
                }
            });
        })();
    </script>
</body>
</html>
